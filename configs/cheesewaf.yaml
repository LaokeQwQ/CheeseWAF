# CheeseWAF MVP configuration.
server:
  listen: "127.0.0.1:8080"
  listen_tls: ""
  admin_listen: "127.0.0.1:9443"
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s

tls:
  auto_cert: false
  cert_file: "./data/certs/admin.crt"
  key_file: "./data/certs/admin.key"
  min_version: "1.3"
  hsts: true

setup:
  data_dir: "./data"
  runtime_dir: "./data/run"
  three_end_unified: true

sites:
  - id: "default"
    name: "localhost"
    domains: ["localhost", "127.0.0.1"]
    upstreams:
      - address: "127.0.0.1:9000"
        weight: 1
    loadbalance: "round_robin"
    enabled: true
    waf:
      enabled: true
      mode: "block"
      semantic_engines:
        sql: true
        xss: true
        rce: false
        lfi: false
        xxe: false
        ssrf: false
      performance:
        max_body_bytes: 8388608
        max_header_bytes: 1048576
        proxy_timeout: 30s

protection:
  ip:
    whitelist: ["127.0.0.1", "::1"]
    blacklist: []
    tags: {}
    geoip:
      enabled: false
      database: "./data/GeoLite2-Country.mmdb"
      blocked_countries: []
  ratelimit:
    enabled: true
    default:
      requests: 100
      window: 60s
      burst: 20
  bot:
    enabled: false
    js_challenge: true
    captcha: false

storage:
  sqlite:
    path: "./data/cheesewaf.db"
  redis:
    enabled: false
    address: "127.0.0.1:6379"

logging:
  level: "info"
  format: "json"
  output:
    type: "file"
    file:
      path: "./logs/access.log"
      max_size: "100MB"
      max_backups: 10

ai:
  enabled: false
  api_base: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  async: true

update:
  ota:
    enabled: false
    server: ""
    channel: "stable"
    check_interval: 6h
    auto_update_rules: true
    auto_update_binary: false
    verify_signature: true
    public_key: ""
