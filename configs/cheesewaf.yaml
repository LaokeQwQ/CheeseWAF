# CheeseWAF MVP configuration.
server:
  listen: "127.0.0.1:8080"
  listen_tls: ""
  listen_http3: ""
  admin_listen: "127.0.0.1:9443"
  read_timeout: 10s
  write_timeout: 30s
  idle_timeout: 60s
  http3:
    enabled: false
    zero_rtt: false

tls:
  auto_cert: false
  cert_file: "./data/certs/admin.crt"
  key_file: "./data/certs/admin.key"
  min_version: "1.3"
  hsts: true

setup:
  data_dir: "./data"
  runtime_dir: "./data/run"
  three_end_unified: true

sites:
  - id: "default"
    name: "localhost"
    domains: ["localhost", "127.0.0.1"]
    upstreams:
      - address: "127.0.0.1:9000"
        weight: 1
    listen_port: 80
    loadbalance: "round_robin"
    enabled: true
    waf:
      enabled: true
      mode: "block"
      semantic_engines:
        sql: true
        xss: true
        rce: true
        lfi: true
        xxe: true
        ssrf: true
      custom_rules:
        - id: "block-admin-probe"
          name: "Admin path probe"
          pattern: "(?i)/(wp-admin|phpmyadmin|\\.git)"
          location: "uri"
          action: "block"
          severity: "medium"
          enabled: true
          priority: 180
      performance:
        max_body_bytes: 8388608
        max_header_bytes: 1048576
        proxy_timeout: 30s
      response:
        enabled: true
        max_body_bytes: 1048576
        sensitive_patterns:
          - "AKIA[0-9A-Z]{16}"
          - "(?i)password\\s*[=:]\\s*['\\\"]?[^'\\\"\\s]+"
          - "(?i)secret[_-]?key\\s*[=:]\\s*['\\\"]?[^'\\\"\\s]+"
      rewrite:
        - id: "legacy-api"
          pattern: "^/v1/(.*)$"
          replacement: "/api/$1"
          redirect_code: 0
          enabled: false
      health_check:
        enabled: true
        path: "/"
        interval: 30s
        timeout: 3s
        healthy_threshold: 2
        unhealthy_threshold: 2

protection:
  ip:
    whitelist: ["127.0.0.1", "::1"]
    blacklist: []
    tags: {}
    threat_intel: []
    geoip:
      enabled: false
      database: "./data/GeoLite2-Country.mmdb"
      blocked_countries: []
      country_cidrs: {}
  ratelimit:
    enabled: true
    default:
      requests: 100
      window: 60s
      burst: 20
    bot:
      enabled: false
      js_challenge: true
      captcha: false
      challenge_difficulty: 4
      waiting_room: false
      waiting_room_max_active: 1000
      waiting_room_ttl: 5m
      challenge_ttl: 30m
    cookie_name: "cheesewaf_js_clearance"
    secret: "change-me-in-production"
    path_prefixes:
      - "/"
    exempt_path_prefixes:
      - "/health"
      - "/api/"
    allowed_user_agents: []
    suspicious_user_agents:
      - "curl"
      - "python-requests"
      - "sqlmap"
      - "nikto"
      - "nuclei"
      - "masscan"
      - "zgrab"
      - "httpclient"
  acl:
    enabled: true
    rules:
      - id: "deny-debug"
        name: "Deny debug endpoints"
        method: ""
        path_prefix: "/debug"
        header: ""
        header_value: ""
        action: "block"
        severity: "high"
        enabled: true

storage:
  sqlite:
    path: "./data/cheesewaf.db"
  redis:
    enabled: false
    address: "127.0.0.1:6379"
  clickhouse:
    enabled: false
    endpoint: ""
    database: "default"
    table: "cheesewaf_logs"
    username: ""
    password: ""
    timeout: 10s
  victorialogs:
    enabled: false
    endpoint: ""
    timeout: 10s
  postgresql:
    enabled: false
    dsn: ""
    table: "cheesewaf_logs"
    timeout: 10s

logging:
  level: "info"
  format: "json"
  output:
    type: "file"
    file:
      path: "./logs/access.log"
      max_size: "100MB"
      max_backups: 10

ai:
  enabled: false
  api_base: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  async: true

update:
  ota:
    enabled: false
    server: ""
    channel: "stable"
    check_interval: 6h
    auto_update_rules: true
    auto_update_binary: false
    verify_signature: true
    public_key: ""

scheduler:
  enabled: true
  tasks:
    - id: "log-cleanup"
      name: "Log cleanup"
      type: "cleanup"
      every: 24h
      target: "./logs"
      keep: 14
      enabled: true
    - id: "config-backup"
      name: "Config backup"
      type: "backup"
      every: 24h
      target: "./data/backups"
      keep: 7
      enabled: false
    - id: "security-daily-report"
      name: "Security daily report"
      type: "security_report"
      frequency: "daily"
      at: "08:00"
      channel: "file"
      recipient: "./data/reports"
      period: "daily"
      format: "markdown"
      enabled: false

edge:
  headers:
    enabled: true
    rules:
      - id: "set-edge-marker"
        name: "Set edge marker"
        operation: "set"
        header: "X-CheeseWAF"
        value: "edge"
        path_prefix: ""
        enabled: true
      - id: "remove-origin-leak"
        name: "Remove origin leak header"
        operation: "delete"
        header: "X-Origin-Secret"
        value: ""
        path_prefix: ""
        enabled: true
  cache:
    enabled: true
    mode: "public"
    ttl: 5m
    status_codes: [200, 304]
    path_prefixes: ["/assets/", "/static/"]
    max_body_bytes: 2097152
  compression:
    enabled: true
    algorithms: ["gzip"]
    level: 5
    min_bytes: 1024
    content_types:
      - "text/"
      - "application/json"
      - "application/javascript"
      - "application/xml"
      - "image/svg+xml"

monitor:
  prometheus:
    enabled: true
    path: "/metrics"
  remote_write:
    enabled: false
    endpoint: ""
    interval: 30s
    timeout: 10s
  alerts:
    enabled: true
    rules:
      - id: "high-block-rate"
        name: "High block rate"
        metric: "cheesewaf_blocked_total"
        operator: ">"
        threshold: 100
        for: 5m
        severity: "high"
        enabled: true
      - id: "disk-usage"
        name: "Disk usage high"
        metric: "cheesewaf_disk_usage_bytes:data"
        operator: ">"
        threshold: 10737418240
        for: 10m
        severity: "medium"
        enabled: true
  notifiers:
    - id: "default-webhook"
      name: "Default webhook"
      type: "webhook"
      endpoint: ""
      to: ""
      token: ""
      headers: {}
      enabled: false

apisec:
  enabled: true
  discovery:
    enabled: true
    sample_limit: 500
    window: 1h
    ignore_prefixes: ["/assets/", "/static/", "/favicon"]
  validation:
    enabled: true
    schemas:
      - id: "api-search"
        method: "GET"
        path_pattern: "^/api/search$"
        required_params: ["q"]
        required_headers: []
        max_body_bytes: 0
        enabled: false
  auth:
    enabled: false
    jwt_issuers: []
    required_scopes: []
  rate_limits:
    - id: "login-api"
      method: "POST"
      path_pattern: "^/api/auth/login$"
      requests: 10
      window: 1m
      enabled: true
  permissions:
    admin: ["*"]
    readonly: ["read:*"]
  audit:
    enabled: true
    path: "./logs/audit.log"
