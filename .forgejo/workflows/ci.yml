name: Forgejo CI
run-name: Forgejo CI

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - canary
      - dev
  workflow_dispatch:

jobs:
  branch-flow:
    name: branch-flow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        shell: bash
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"

          case "$base" in
            master)
              if [[ "$head" != "canary" ]]; then
                echo "::error::master only accepts pull requests from canary."
                exit 1
              fi
              ;;
            canary)
              if [[ "$head" != "dev" ]]; then
                echo "::error::canary only accepts pull requests from dev."
                exit 1
              fi
              ;;
            dev)
              if [[ "$head" == "master" || "$head" == "canary" ]]; then
                echo "::error::dev cannot accept downward pull requests from master or canary."
                exit 1
              fi
              ;;
            *)
              echo "::error::protected pull requests must target dev, canary, or master."
              exit 1
              ;;
          esac

  go-mod-tidy:
    name: go-mod-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Verify go.mod and go.sum
        shell: bash
        run: |
          bash scripts/ci/go-env.sh go mod tidy
          git diff --exit-code -- go.mod go.sum

  go-test:
    name: go-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Test
        shell: bash
        run: bash scripts/ci/go-env.sh go test -race -count=1 ./cmd/... ./internal/...

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node from mirror
        shell: bash
        run: bash scripts/ci/setup-node-mirror.sh
      - name: Install dependencies
        working-directory: web
        shell: bash
        run: npm ci
      - name: Build dashboard
        working-directory: web
        shell: bash
        run: npm run build

  go-vulncheck:
    name: go-vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Scan Go vulnerabilities
        shell: bash
        run: bash scripts/ci/go-env.sh go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/...

  web-audit:
    name: web-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node from mirror
        shell: bash
        run: bash scripts/ci/setup-node-mirror.sh
      - name: Install dependencies
        working-directory: web
        shell: bash
        run: npm ci
      - name: Audit web dependencies
        working-directory: web
        shell: bash
        run: npm audit --audit-level=high

  security-corpus:
    name: security-corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Run curated semantic corpus
        shell: bash
        run: bash scripts/ci/go-env.sh go run ./cmd/cheesewaf-corpus --mode analyzer

  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Build all release targets
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            output="bin/cheesewaf-${goos}-${goarch}${ext}"
            echo "building ${target} -> ${output}"
            GOOS="$goos" GOARCH="$goarch" bash scripts/ci/go-env.sh go build -trimpath -o "$output" ./cmd/cheesewaf/
          done

  release-artifacts:
    name: release-artifacts
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'canary' || github.ref_name == 'master'))
    runs-on: ubuntu-latest
    needs:
      - go-mod-tidy
      - go-test
      - web-build
      - go-vulncheck
      - web-audit
      - security-corpus
      - cross-build
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Go from mirror
        shell: bash
        run: bash scripts/ci/setup-go-mirror.sh
      - name: Setup Node from mirror
        shell: bash
        run: bash scripts/ci/setup-node-mirror.sh
      - name: Package branch release artifacts
        shell: bash
        env:
          CHEESEWAF_REF_NAME: ${{ github.ref_name }}
          CHEESEWAF_RUN_NUMBER: ${{ github.run_number }}
          CHEESEWAF_COMMIT: ${{ github.sha }}
        run: bash scripts/ci/go-env.sh bash scripts/ci/package-release.sh
      - name: Upload branch release artifacts
        uses: https://data.forgejo.org/forgejo/upload-artifact@16871d9e8cfcf27ff31822cac382bbb5450f1e1e # v4
        with:
          name: cheesewaf-${{ github.ref_name }}-${{ github.run_number }}-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
