name: CI
run-name: CI

"on":
  pull_request:
    branches:
      - master
      - canary
      - dev
  push:
    branches:
      - master
      - canary
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-flow:
    name: branch-flow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        shell: bash
        env:
          PR_BASE_REF: ${{ github.base_ref }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          base="${PR_BASE_REF}"
          head="${PR_HEAD_REF}"

          case "$base" in
            master)
              if [[ "$head" != "canary" ]]; then
                echo "::error::master only accepts pull requests from canary."
                exit 1
              fi
              ;;
            canary)
              if [[ "$head" != "dev" ]]; then
                echo "::error::canary only accepts pull requests from dev."
                exit 1
              fi
              ;;
            dev)
              if [[ "$head" == "master" || "$head" == "canary" ]]; then
                echo "::error::dev cannot accept downward pull requests from master or canary."
                exit 1
              fi
              ;;
            *)
              echo "::error::protected pull requests must target dev, canary, or master."
              exit 1
              ;;
          esac

  ci-static:
    name: ci-static
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify CI and release policy
        shell: bash
        run: bash scripts/ci/verify-ci-static.sh
      - name: Validate GitHub Actions workflows
        shell: bash
        run: bash scripts/ci/go-env.sh go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 -shellcheck= -pyflakes= -color .github/workflows/*.yml
      - name: Verify Ansible syntax
        shell: bash
        run: bash scripts/ci/verify-ansible.sh

  go-mod-tidy:
    name: go-mod-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go.mod and go.sum
        run: |
          bash scripts/ci/go-env.sh go mod tidy
          git diff --exit-code -- go.mod go.sum

  go-test:
    name: go-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: bash scripts/ci/go-env.sh go test -race -count=1 ./cmd/... ./internal/...

  go-quality:
    name: go-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify formatting
        shell: bash
        run: bash scripts/ci/verify-go-quality.sh format
      - name: Run go vet
        shell: bash
        run: bash scripts/ci/verify-go-quality.sh vet
      - name: Enforce coverage floor
        shell: bash
        run: bash scripts/ci/verify-go-quality.sh coverage

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        # @agent-eyes postinstall runs `pnpm build`; published dist is usable without it.
        run: npm ci --ignore-scripts
      - name: Run CAPTCHA contract tests
        working-directory: web
        run: npm run test:captcha-contract
      - name: Install pinned coverage provider
        working-directory: web
        run: npm install --no-save --package-lock=false --ignore-scripts @vitest/coverage-v8@4.1.10
      - name: Run dashboard tests with coverage
        working-directory: web
        run: npm test -- --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=json-summary --coverage.thresholds.lines=5 --coverage.thresholds.functions=5 --coverage.thresholds.statements=5 --coverage.thresholds.branches=1
      - name: Verify coverage output
        working-directory: web
        shell: bash
        run: test -s coverage/coverage-summary.json
      - name: Typecheck dashboard
        working-directory: web
        run: npm run typecheck
      - name: Build dashboard
        working-directory: web
        run: npm run build

  go-vulncheck:
    name: go-vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Scan Go vulnerabilities
        run: bash scripts/ci/go-env.sh go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./cmd/... ./internal/...

  web-audit:
    name: web-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci --ignore-scripts
      - name: Audit web dependencies
        working-directory: web
        run: npm audit --audit-level=high

  security-corpus:
    name: security-corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run curated semantic corpus
        run: bash scripts/ci/go-env.sh go run ./cmd/cheesewaf-corpus --mode analyzer

  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all release targets
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            output="bin/cheesewaf-${goos}-${goarch}${ext}"
            echo "building ${target} -> ${output}"
            GOOS="$goos" GOARCH="$goarch" bash scripts/ci/go-env.sh go build -trimpath -o "$output" ./cmd/cheesewaf/
          done

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build pinned container image
        shell: bash
        run: bash scripts/ci/docker-build.sh

  goreleaser-snapshot:
    name: goreleaser-snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build GoReleaser snapshot
        shell: bash
        run: bash scripts/ci/go-env.sh go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --snapshot --clean
      - name: Verify GoReleaser snapshot
        shell: bash
        run: bash scripts/ci/verify-release.sh dist

  release-package-smoke:
    name: release-package-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build Linux release package
        shell: bash
        env:
          CHEESEWAF_REF_NAME: ci
          CHEESEWAF_RUN_NUMBER: ${{ github.run_number }}
          CHEESEWAF_COMMIT: ${{ github.sha }}
          CHEESEWAF_TARGETS: linux/amd64
          CHEESEWAF_RELEASE_DIR: release-smoke
          CHEESEWAF_RELEASE_WORK_DIR: tmp/release-smoke
        run: bash scripts/ci/go-env.sh bash scripts/ci/package-release.sh
      - name: Verify release package
        shell: bash
        run: bash scripts/ci/verify-release.sh release-smoke

  release-artifacts:
    name: release-artifacts
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'canary' || github.ref_name == 'master'))
    runs-on: ubuntu-latest
    needs:
      - go-mod-tidy
      - go-test
      - go-quality
      - web-build
      - go-vulncheck
      - web-audit
      - security-corpus
      - cross-build
      - ci-static
      - docker-build
      - goreleaser-snapshot
      - release-package-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package branch release artifacts
        shell: bash
        env:
          CHEESEWAF_REF_NAME: ${{ github.ref_name }}
          CHEESEWAF_RUN_NUMBER: ${{ github.run_number }}
          CHEESEWAF_COMMIT: ${{ github.sha }}
        run: bash scripts/ci/go-env.sh bash scripts/ci/package-release.sh
      - name: Verify branch release artifacts
        shell: bash
        run: bash scripts/ci/verify-release.sh release
      - name: Upload branch release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cheesewaf-${{ github.ref_name }}-${{ github.run_number }}-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
