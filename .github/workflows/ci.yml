name: CI
run-name: CI

"on":
  pull_request:
    branches:
      - master
      - canary
      - dev
  push:
    branches:
      - master
      - canary
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branch-flow:
    name: branch-flow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        shell: bash
        run: |
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"

          case "$base" in
            master)
              if [[ "$head" != "canary" ]]; then
                echo "::error::master only accepts pull requests from canary."
                exit 1
              fi
              ;;
            canary)
              if [[ "$head" != "dev" ]]; then
                echo "::error::canary only accepts pull requests from dev."
                exit 1
              fi
              ;;
            dev)
              if [[ "$head" == "master" || "$head" == "canary" ]]; then
                echo "::error::dev cannot accept downward pull requests from master or canary."
                exit 1
              fi
              ;;
            *)
              echo "::error::protected pull requests must target dev, canary, or master."
              exit 1
              ;;
          esac

  go-mod-tidy:
    name: go-mod-tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go.mod and go.sum
        run: |
          bash scripts/ci/go-env.sh go mod tidy
          git diff --exit-code -- go.mod go.sum

  go-test:
    name: go-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: bash scripts/ci/go-env.sh go test -race -count=1 ./cmd/... ./internal/...

  web-build:
    name: web-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build dashboard
        working-directory: web
        run: npm run build

  go-vulncheck:
    name: go-vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Scan Go vulnerabilities
        run: bash scripts/ci/go-env.sh go run golang.org/x/vuln/cmd/govulncheck@latest ./cmd/... ./internal/...

  web-audit:
    name: web-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Audit web dependencies
        working-directory: web
        run: npm audit --audit-level=high

  security-corpus:
    name: security-corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run curated semantic corpus
        run: bash scripts/ci/go-env.sh go run ./cmd/cheesewaf-corpus --mode analyzer

  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build all release targets
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p bin
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
            fi
            output="bin/cheesewaf-${goos}-${goarch}${ext}"
            echo "building ${target} -> ${output}"
            GOOS="$goos" GOARCH="$goarch" bash scripts/ci/go-env.sh go build -trimpath -o "$output" ./cmd/cheesewaf/
          done

  release-artifacts:
    name: release-artifacts
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'canary' || github.ref_name == 'master'))
    runs-on: ubuntu-latest
    needs:
      - go-mod-tidy
      - go-test
      - web-build
      - go-vulncheck
      - web-audit
      - security-corpus
      - cross-build
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Package branch release artifacts
        shell: bash
        env:
          CHEESEWAF_REF_NAME: ${{ github.ref_name }}
          CHEESEWAF_RUN_NUMBER: ${{ github.run_number }}
          CHEESEWAF_COMMIT: ${{ github.sha }}
        run: bash scripts/ci/go-env.sh bash scripts/ci/package-release.sh
      - name: Upload branch release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: cheesewaf-${{ github.ref_name }}-${{ github.run_number }}-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
