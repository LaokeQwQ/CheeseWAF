services:
  cheesewaf:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: cheesewaf:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9443:9443"
    volumes:
      - cheesewaf-data:/var/lib/cheesewaf
      - cheesewaf-logs:/var/log/cheesewaf
      - ../../configs/cheesewaf.yaml:/etc/cheesewaf/cheesewaf.yaml:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/cheesewaf", "status"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cheesewaf-data:
  cheesewaf-logs:
