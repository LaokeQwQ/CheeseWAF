version: 2

project_name: cheesewaf

before:
  hooks:
    - go mod download
    - bash scripts/ci/build-web.sh
    - bash scripts/ci/generate-release-metadata.sh tmp/goreleaser-metadata {{ .Version }} release goreleaser {{ .Commit }} {{ .Date }}

builds:
  - id: cheesewaf
    main: ./cmd/cheesewaf/
    binary: cheesewaf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/LaokeQwQ/CheeseWAF/internal/version.Version={{.Version}}
      - -X github.com/LaokeQwQ/CheeseWAF/internal/version.Commit={{.Commit}}
      - -X github.com/LaokeQwQ/CheeseWAF/internal/version.BuildTime={{.Date}}
      - -X github.com/LaokeQwQ/CheeseWAF/internal/version.Channel=release
    flags:
      - -trimpath

archives:
  - id: cheesewaf-archive
    ids:
      - cheesewaf
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: scripts/ci/waf-cli
        dst: waf-cli
        info:
          mode: 0755
      - src: scripts/ci/waf-cli.cmd
        dst: waf-cli.cmd
      - src: tmp/goreleaser-metadata/VERSION
        dst: VERSION
      - src: tmp/goreleaser-metadata/release.json
        dst: release.json
      - web/dist/index.html
      - web/dist/*.png
      - web/dist/**/*
      - configs/*
      - README.md
      - README_CN.md
      - LICENSE

checksum:
  name_template: SHA256SUMS

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: LaokeQwQ
    name: CheeseWAF
